# Base on .github/workflows/release.yml from atxhua/i686-atxhua-elf-tools (MIT) repo
name: release

on:
  workflow_dispatch:
    inputs:
      gcc_version:
        required: true
        type: string
        
      binutils_version:
        required: true
        type: string
    
      gdb_version:
        required: true
        type: string

      newlib_version:
        required: true
        type: string


jobs:
  i686:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
        
    - name: build
      run:  ./i686-atxhua-elf-tools/i686-elf-tools.sh binutils gcc gdb newlib linux zip -parallel -gv ${{ inputs.gcc_version }} -bv ${{ inputs.binutils_version }} -dv ${{ inputs.gdb_version }} -nv ${{ inputs.newlib_version }} -pp i686-atxhua-newlib-elf

    - uses: actions/upload-artifact@v4
      with:
        name: i686-elf-tools
        path: |
          /home/runner/build-i686-elf/i686-atxhua-newlib-elf*.zip
          /home/runner/build-i686-elf/i686-atxhua-newlib-elf*.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [i686]

    steps:
    - uses: actions/download-artifact@v4.1.7
      
    - name: release
      uses: softprops/action-gh-release@v0.1.15
      with:
        name: GCC ${{ inputs.gcc_version }}
        tag_name: ${{ inputs.gcc_version }}
        fail_on_unmatched_files: false
        draft: true
        files: |
          **/*.zip
          **/*.tar.gz
        body: |
          -GCC ${{ inputs.gcc_version }}
          -Binutils ${{ inputs.binutils_version }}
          -GDB ${{ inputs.gdb_version }}
          -Newlib ${{ inputs.newlib_version }}
